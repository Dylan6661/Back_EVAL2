# =====================================================
# PIPELINE CI/CD - Backend API + MySQL
# Trigger: Push a rama 'deploy'
# Flujo: Build → Push a Docker Hub → Deploy en EC2
# =====================================================

name: CI/CD Backend - Build, Push & Deploy

on:
  push:
    branches:
      - deploy

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/backend-api
  EC2_HOST: ${{ secrets.EC2_BACKEND_HOST }}

jobs:
  # ---- Job 1: Build y Push de la imagen Docker ----
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Clonar el repositorio
      - name: Checkout del código
        uses: actions/checkout@v4

      # Paso 2: Iniciar sesión en Docker Hub
      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Paso 3: Configurar Docker Buildx para builds optimizados
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Paso 4: Construir y publicar la imagen Docker
      - name: Build y Push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- Job 2: Deploy en instancia EC2 ----
  deploy:
    name: Deploy en EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # Paso 1: Checkout para obtener docker-compose y scripts de init
      - name: Checkout del código
        uses: actions/checkout@v4

      # Paso 2: Copiar archivos necesarios a EC2
      - name: Copiar archivos a EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_BACKEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,init-db/"
          target: "/home/${{ secrets.EC2_USER }}/backend-app"

      # Paso 3: Deploy via SSH en la instancia EC2
      - name: Deploy en EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_BACKEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== Iniciando deploy del Backend ==="
            
            cd /home/${{ secrets.EC2_USER }}/backend-app
            
            # Hacer pull de la imagen más reciente
            docker pull ${{ env.DOCKER_IMAGE }}:latest
            
            # Crear archivo .env para docker-compose
            cat > .env << EOF
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }}
            EOF
            
            # Detener contenedor backend anterior (mantener MySQL para persistencia)
            docker stop backend-api 2>/dev/null || true
            docker rm backend-api 2>/dev/null || true
            
            # Ejecutar backend con conexión a MySQL
            docker run -d \
              --name backend-api \
              --restart unless-stopped \
              --network backend-eval2_backend-network \
              -p 3000:3000 \
              -e PORT=3000 \
              -e DB_HOST=mysql-database \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e DB_PORT=3306 \
              -e NODE_ENV=production \
              ${{ env.DOCKER_IMAGE }}:latest
            
            # Verificar que MySQL esté corriendo, si no, levantar con compose
            if ! docker ps | grep -q mysql-database; then
              echo "Levantando MySQL con docker-compose..."
              docker compose up -d mysql-db
            fi
            
            # Limpiar imágenes antiguas no utilizadas
            docker image prune -f
            
            echo "=== Deploy del Backend completado ==="
